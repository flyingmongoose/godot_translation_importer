name: release

on:
  workflow_run:
    workflows: ["build"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true
        type: string
      run_id:
        description: "Build workflow run ID containing artifacts"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag and source SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            run_id="${{ inputs.run_id }}"
            target_sha="$(gh api "repos/$REPO/git/ref/tags/$tag" --jq '.object.sha')"
          else
            run_id="$RUN_ID"
            target_sha="$SHA"

            # workflow_run comes from all build events; only release tagged builds.
            tag="$(gh api "repos/$REPO/tags?per_page=100" --paginate --jq ".[] | select(.commit.sha == \"$target_sha\" and (.name | test(\"^v\"))) | .name" | head -n1)"
            if [[ -z "$tag" ]]; then
              echo "Build run is not associated with a v* tag; skipping release."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Resolve tag -> commit SHA, handling both lightweight and annotated tags.
          ref_type="$(gh api "repos/$REPO/git/ref/tags/$tag" --jq '.object.type')"
          ref_sha="$(gh api "repos/$REPO/git/ref/tags/$tag" --jq '.object.sha')"
          if [[ "$ref_type" == "tag" ]]; then
            target_sha="$(gh api "repos/$REPO/git/tags/$ref_sha" --jq '.object.sha')"
          else
            target_sha="$ref_sha"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts from matching run
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        shell: bash
        run: |
          mkdir -p release-dist
          gh run download "$RUN_ID" --repo "$REPO" --name native-linux --dir release-dist/linux
          gh run download "$RUN_ID" --repo "$REPO" --name native-windows --dir release-dist/windows
          gh run download "$RUN_ID" --repo "$REPO" --name native-macos --dir release-dist/macos

      - name: Ensure release exists
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.resolve.outputs.tag }}
        shell: bash
        run: |
          if ! gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --repo "$REPO" --generate-notes || \
            gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1
          fi

      - name: Upload release assets
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.resolve.outputs.tag }}
        shell: bash
        run: |
          gh release upload "$TAG_NAME" --repo "$REPO" release-dist/linux/*.zip --clobber
          gh release upload "$TAG_NAME" --repo "$REPO" release-dist/windows/*.zip --clobber
          gh release upload "$TAG_NAME" --repo "$REPO" release-dist/macos/*.zip --clobber
