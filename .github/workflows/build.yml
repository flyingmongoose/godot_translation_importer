name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build (${{ matrix.label }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build CLI and GUI (onefile)
        run: |
          python scripts/build_native.py --target all --onefile

      - name: Package dist archive
        env:
          LABEL: ${{ matrix.label }}
        run: python -c "import os, shutil; from pathlib import Path; label=os.environ['LABEL']; dist=Path('dist'); out_dir=Path('artifact-dist'); out_dir.mkdir(parents=True, exist_ok=True); archive_base=out_dir / f'godot-translation-import-{label}'; shutil.make_archive(str(archive_base), 'zip', root_dir=str(dist))"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.label }}
          path: artifact-dist/*.zip
          if-no-files-found: error
